<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>Sber Terminal</title><style>html,body{margin:0;padding:0;width:100%;height:100%;background-color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden;touch-action:none}.sber-screen{background:#fff;width:100%;height:100%;user-select:none;display:flex;flex-direction:column;justify-content:space-between;align-items:center;position:relative;box-sizing:border-box}.terminal-header{width:100%;background:#212224;color:#fff;padding:12px 16px;display:flex;justify-content:flex-start;align-items:center;border-bottom:4px solid #21a038;box-sizing:border-box}.terminal-main{flex-grow:1;display:flex;flex-direction:column;justify-content:center;align-items:center;width:100%;padding:20px;box-sizing:border-box;position:relative}.status-text{color:#333;font-size:24px;font-weight:600;margin:0 0 20px 0}.amount-display{font-size:46px;font-weight:700;margin:15px 0;color:#111}.sber-center-logo{margin-bottom:35px;display:flex;justify-content:center;align-items:center}.spinner{width:60px;height:60px;border:6px solid #f3f3f3;border-top:6px solid #21a038;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 25px auto}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.success-bg{background:#21a038;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;animation:fadeIn .2s ease-out;position:absolute;top:0;left:0;z-index:10}.success-title{font-size:28px;font-weight:700;letter-spacing:.5px;margin-top:20px}@keyframes fadeIn{from{opacity:0}to{opacity:1}}#auth-box,#process-box,#success-box,#wait-box{width:100%;display:none}.secret-bolt-trigger{position:absolute;bottom:0;right:0;width:60px;height:60px;background:transparent;cursor:pointer;z-index:1000}.admin-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;color:#fff;padding:22px;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.7);width:260px;z-index:9999;border:1px solid #444;box-sizing:border-box}.admin-panel label{font-size:14px;color:#bbbbbb;display:block;margin-top:8px}.admin-panel input{width:100%;padding:12px;margin:4px 0 8px 0;box-sizing:border-box;border:1px solid #444;background:#111;border-radius:6px;color:#fff;font-size:18px;outline:none}.admin-panel button{width:100%;padding:12px;background:#21a038;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:8px;font-size:15px}.admin-panel button.process-btn{background:#007bff}.admin-panel button.reset-btn{background:#dc3545}.lock-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:10000;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;box-sizing:border-box}.lock-input{width:100%;max-width:260px;padding:14px;font-size:20px;text-align:center;letter-spacing:2px;border:2px solid #ddd;border-radius:8px;margin-bottom:15px;outline:none;background:#f9f9f9}.lock-btn-container{display:flex;gap:10px;width:100%;max-width:260px;box-sizing:border-box}.lock-btn{flex:1;padding:14px;background:#21a038;color:#fff;font-size:14px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;text-align:center}.buy-btn{flex:1;padding:14px;background:#4e5057;color:#fff;font-size:14px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;text-decoration:none;text-align:center;display:inline-block;box-sizing:border-box}</style></head><body><div id="lockScreen" class="lock-screen"><div style="margin-bottom:30px"><svg width="70" height="70" viewBox="0 0 36 36" fill="none"><defs><linearGradient id="sberGrad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#008bf2"/><stop offset="35%" stop-color="#00b050"/><stop offset="70%" stop-color="#a6d900"/><stop offset="100%" stop-color="#21a038"/></linearGradient></defs><circle cx="18" cy="18" r="14" stroke="url(#sberGrad2)" stroke-width="3.5" fill="none" stroke-dasharray="72 20" transform="rotate(-40 18 18)"/><path d="M12 18l4 4 10-10" stroke="#21a038" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><input type="password" id="passInput" class="lock-input" placeholder="Введите пароль"><div class="lock-btn-container"><button onclick="checkPassword()" class="lock-btn">Войти</button><a href="http://t.me" target="_blank" class="buy-btn">Купить ключ</a></div></div><div class="sber-screen"><div class="terminal-header"><svg width="150" height="36" viewBox="0 0 150 36" fill="none"><defs><linearGradient id="sberGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#008bf2"/><stop offset="35%" stop-color="#00b050"/><stop offset="70%" stop-color="#a6d900"/><stop offset="100%" stop-color="#21a038"/></linearGradient></defs><circle cx="18" cy="18" r="14" stroke="url(#sberGrad)" stroke-width="3.5" fill="none" stroke-dasharray="72 20" transform="rotate(-40 18 18)"/><path d="M12 18l4 4 10-10" stroke="#21a038" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><text x="40" y="24" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" letter-spacing="0.5">СБЕР</text></svg></div><div class="terminal-main"><div id="wait-box" style="display:block"><div class="sber-center-logo"><svg width="90" height="90" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="14" stroke="url(#sberGrad)" stroke-width="3.5" fill="none" stroke-dasharray="72 20" transform="rotate(-40 18 18)"/><path d="M12 18l4 4 10-10" stroke="#21a038" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><p class="status-text">Приложите карту</p><div class="amount-display"><span class="display-sum">0.00</span> €</div></div><div id="process-box"><div class="spinner"></div><p class="status-text" style="color:#007bff">Обрабатывается...</p><div class="amount-display"><span class="display-sum">0.00</span> €</div></div><div id="auth-box"><div class="spinner" style="border-top-color:#ffc107"></div><p class="status-text" style="color:#b58900">Авторизация...</p><div class="amount-display"><span class="display-sum">0.00</span> €</div></div><div id="success-box"><div class="success-bg"><svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><div class="success-title">СПАСИБО</div><p style="font-size:16px;margin-top:8px;opacity:0.9">ОПЛАЧЕНО</p></div></div></div><div style="height:20px;width:100%"></div><div class="secret-bolt-trigger" onclick="toggleAdminPanel()"></div></div><div class="admin-panel" id="adminPanel"><h4 style="margin:0 0 12px 0;text-align:center;font-size:16px">Панель Кассира</h4><label>Сумма заказа (€):</label><input type="number" id="inputSum" placeholder="0.00" value="0"><button onclick="localSetSum()">Записать сумму</button><button class="process-btn" onclick="startPaymentChain()">Запустить процесс</button><label>Таймер шага (в мс):</label><input type="number" id="inputTimer" placeholder="2500" value="2500"><button class="reset-btn" onclick="localResetTerminal()">Сбросить всё</button></div><script>if(localStorage.getItem("sber_auth")==="true")document.getElementById("lockScreen").style.display="none";function checkPassword(){const e=document.getElementById("passInput").value;if("145390735735"===e)return localStorage.setItem("sber_auth","true"),document.getElementById("lockScreen").style.display="none",void 0;if(["KJVN41","29XPLW","MTCZ73","85BQRK","NDFS62","14YHWG","QFZP38","50LXVR","JWSK96","37DHBC","GMRV54","61PTYN"].includes(e)){const t=JSON.parse(localStorage.getItem("used_sber_codes")||"[]");t.includes(e)?(alert("Этот одноразовый код уже был использован!"),document.getElementById("passInput").value=""):(t.push(e),localStorage.setItem("used_sber_codes",JSON.stringify(t)),localStorage.setItem("sber_auth","true"),document.getElementById("lockScreen").style.display="none")}else alert("Неверный пароль или код"),document.getElementById("passInput").value=""}function toggleAdminPanel(){const e=document.getElementById("adminPanel");e.style.display="block"===e.style.display?"none":"block"}function clearDisplay(){document.getElementById("wait-box").style.display="none",document.getElementById("process-box").style.display="none",document.getElementById("auth-box").style.display="none",document.getElementById("success-box").style.display="none"}function updateSumDisplays(e){const t=document.getElementsByClassName("display-sum"),n=parseFloat(e).toFixed(2);for(let e=0;e<t.length;e++)t[e].innerText=n}function localSetSum(){const e=document.getElementById("inputSum").value||"0";updateSumDisplays(e),clearDisplay(),document.getElementById("wait-box").style.display="block",toggleAdminPanel()}function startPaymentChain(){const e=document.getElementById("inputSum").value||"0",t=parseInt(document.getElementById("inputTimer").value)||2500;updateSumDisplays(e),toggleAdminPanel(),clearDisplay(),document.getElementById("wait-box").style.display="block",setTimeout(function(){clearDisplay(),document.getElementById("process-box").style.display="block",setTimeout(function(){clearDisplay(),document.getElementById("auth-box").style.display="block",setTimeout(function(){clearDisplay(),document.getElementById("success-box").style.display="block"},t)},t)},t)}function localResetTerminal(){document.getElementById("inputSum").value="0",document.getElementById("inputTimer").value="2500",updateSumDisplays("0"),clearDisplay(),document.getElementById("wait-box").style.display="block",toggleAdminPanel()}</script></body></html>
